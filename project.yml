name: olcrtc-ios

options:
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.6.0"

targets:
  olcrtc-ios:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "Mobile.xcframework/**"
      - path: scripts/srv.sh
        buildPhase: resources
      # #314: rotate-key.sh ships alongside srv.sh — uploaded over SSH by the
      # "generate new key" fallback of the #303 recover-connection flow.
      - path: scripts/rotate-key.sh
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        # #376: this is the base/en fallback; localized variants live in
        # App/<lang>.lproj/InfoPlist.strings (the OS reads the prompt from the
        # bundle, so it can't go through the runtime L10n enum).
        NSCameraUsageDescription: "Used to scan QR codes for importing server connections."
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        # #340 was: UIUserInterfaceStyle: Dark (#258 forced dark app-wide) —
        # appearance now follows the in-app System/Light/Dark setting via
        # preferredColorScheme; the plist key would have overridden it.
        # #241: home-screen name shows the brand "OlcRTC" (upstream's display
        # spelling) instead of the repo slug "olcrtc-ios". Technical IDs (scheme,
        # bundle id, container, OLCRTC_* env) stay lowercase olcrtc.
        CFBundleDisplayName: OlcRTC
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "254"
        CFBundleURLTypes:
          - CFBundleURLName: olcrtc
            CFBundleURLSchemes:
              - olcrtc
              # #111: subscription links — olcrtc-sub://host/path opens the
              # app and imports the server list (docs/uri.md → Subscription
              # links; payload format: olcrtc-upstream/docs/sub.md).
              - olcrtc-sub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexk.olcrtc-ios
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.3"
        CODE_SIGN_ENTITLEMENTS: App/Entitlements.plist
    preBuildScripts:
      - name: "Parity: Provisioning.swift vs olcrtc-upstream/script/srv.sh (server-side only)"
        script: |
          python3 "$SRCROOT/scripts/parity_check.py"
        basedOnDependencyAnalysis: false
    resources: []
    dependencies:
      - framework: App/Mobile.xcframework
        embed: true
        codeSign: true
      - sdk: libresolv.tbd
      - sdk: libz.tbd
      - package: Citadel

  olcrtc-ios-tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: olcrtc-ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexk.olcrtc-ios-tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/olcrtc-ios.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/olcrtc-ios
        BUNDLE_LOADER: $(TEST_HOST)
