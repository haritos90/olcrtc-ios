name: olcrtc-ios

options:
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.6.0"

targets:
  olcrtc-ios:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "Mobile.xcframework/**"
      - path: scripts/srv.sh
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSCameraUsageDescription: "Used to scan QR codes for importing server connections."
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        # #258: the redesign palette is authored for dark — force a dark appearance
        # app-wide (covers SwiftUI + UIKit alerts / action sheets / share sheets).
        UIUserInterfaceStyle: Dark
        # #241: home-screen name shows the brand "OlcRTC" (upstream's display
        # spelling) instead of the repo slug "olcrtc-ios". Technical IDs (scheme,
        # bundle id, container, OLCRTC_* env) stay lowercase olcrtc.
        CFBundleDisplayName: OlcRTC
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "221"
        CFBundleURLTypes:
          - CFBundleURLName: olcrtc
            CFBundleURLSchemes:
              - olcrtc
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexk.olcrtc-ios
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.2"
        CODE_SIGN_ENTITLEMENTS: App/Entitlements.plist
    preBuildScripts:
      - name: "Parity: Provisioning.swift vs olcrtc-upstream/script/srv.sh (server-side only)"
        script: |
          python3 "$SRCROOT/scripts/parity_check.py"
        basedOnDependencyAnalysis: false
    resources: []
    dependencies:
      - framework: App/Mobile.xcframework
        embed: true
        codeSign: true
      - sdk: libresolv.tbd
      - sdk: libz.tbd
      - package: Citadel

  olcrtc-ios-tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: olcrtc-ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexk.olcrtc-ios-tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/olcrtc-ios.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/olcrtc-ios
        BUNDLE_LOADER: $(TEST_HOST)
