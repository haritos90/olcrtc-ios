# #253: Publish, per version tag (v*), a prebuilt Mobile.xcframework (cloners
# download it with ./scripts/fetch-framework.sh instead of building from source)
# AND an unsigned olcrtc-ios-unsigned.ipa for sideloaders. Also runnable manually
# against an existing tag.
#
# The framework is cached by the pinned upstream commit, so it is built once per
# core version and reused (byte-identical) across releases. The release notes are
# the (annotated) tag's own message — write it with `git tag -a vX -m "notes"` —
# followed by an auto-generated changelog (commit subjects since the previous v*
# tag) and the asset footer.
name: Release framework

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build the framework for and attach it to"
        required: true

permissions:
  contents: write # create/update the GitHub Release and upload the assets

jobs:
  framework:
    name: Build & attach Mobile.xcframework + unsigned .ipa
    runs-on: macos-15
    steps:
      - name: Checkout (tag + olcrtc-upstream submodule)
        uses: actions/checkout@v5
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0 # full history + tag objects, so we can read the tag's message

      # The framework is a pure function of the upstream commit — build it once per
      # core version and reuse it across releases (a cache hit skips Go entirely and
      # keeps the published bytes identical until the submodule pin moves).
      - name: Resolve pinned upstream commit (cache key)
        id: upstream
        run: echo "sha=$(git -C olcrtc-upstream rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache Mobile.xcframework
        id: fwcache
        uses: actions/cache@v5
        with:
          path: App/Mobile.xcframework
          key: mobile-xcframework-${{ runner.os }}-${{ steps.upstream.outputs.sha }}

      - name: Set up Go (version from the submodule's go.mod)
        if: steps.fwcache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: olcrtc-upstream/go.mod
          cache-dependency-path: olcrtc-upstream/go.sum

      - name: Build Mobile.xcframework
        if: steps.fwcache.outputs.cache-hit != 'true'
        run: bash scripts/build-framework.sh

      # Archive root is Mobile.xcframework/ so fetch-framework.sh unzips straight
      # into App/. -y preserves any symlinks in the bundle.
      - name: Zip Mobile.xcframework
        run: |
          cd App
          zip -r -y ../Mobile.xcframework.zip Mobile.xcframework

      # Release body = the annotated tag's message + a changelog of commit
      # subjects since the previous v* tag + an asset footer. A lightweight tag
      # (no message) falls back to a one-line default.
      - name: Build release notes
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          # 1. Tag message (annotated) or a default one-liner.
          if [ "$(git cat-file -t "$TAG" 2>/dev/null)" = "tag" ]; then
            git tag -l --format='%(contents)' "$TAG" > notes.md
          else
            echo "Release $TAG." > notes.md
          fi
          # 2. Changelog: commit subjects reachable from this tag but not the
          #    previous v* tag (whole history on the first release). `$TAG^` starts
          #    the search at the tagged commit's parent so the current tag is never
          #    matched; fetch-depth: 0 above guarantees all tags + history are here.
          PREV=$(git describe --tags --abbrev=0 --match 'v*' "$TAG^" 2>/dev/null || true)
          {
            echo
            echo "---"
            if [ -n "$PREV" ]; then
              echo "**Changes since $PREV**"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$PREV..$TAG"
            else
              echo "**Changes**"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$TAG"
            fi
            echo
          } >> notes.md
          # 2b. #305: tasks closed since the previous tag, from TODO.md's Closed
          #     table (diff this tag's TODO.md against $PREV's). Omitted on the
          #     first release or when nothing new was closed.
          if [ -n "$PREV" ]; then
            CLOSED=$(python3 scripts/closed-tasks-since.py --since "$PREV" 2>/dev/null || true)
            if [ -n "$CLOSED" ]; then
              {
                echo
                echo "**Tasks closed since $PREV**"
                echo
                echo "$CLOSED"
                echo
              } >> notes.md
            fi
          fi
          # 2c. #349: ready-to-paste SideStore/LiveContainer install links for the
          #     .ipa asset. GitHub strips non-https schemes from markdown links,
          #     so they are code spans the reader copies into Safari on the iPhone.
          IPA_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/$TAG/olcrtc-ios-unsigned.ipa"
          {
            echo
            echo "**Install on iPhone** — copy the link for your sideloading app into Safari ([setup](https://github.com/${GITHUB_REPOSITORY}#install-on-your-iphone-sideload)):"
            echo
            echo "- SideStore: \`sidestore://install?url=$IPA_URL\`"
            echo "- LiveContainer: \`livecontainer://install?url=$IPA_URL\`"
          } >> notes.md
          # 3. Asset footer.
          {
            echo
            echo "---"
            echo "**Assets**"
            # #306: list the .ipa first — it leads on the Release page.
            # #349 was: … sideloading (AltStore / Sideloadly).
            echo "- \`olcrtc-ios-unsigned.ipa\` — unsigned build for sideloading (SideStore / LiveContainer / AltStore / Sideloadly)."
            echo "- \`Mobile.xcframework.zip\` — prebuilt olcrtc core (device + simulator). Download: \`./scripts/fetch-framework.sh $TAG\`."
          } >> notes.md

      # The unsigned .ipa depends on the Swift code (changes per tag), so it is
      # always rebuilt — against the framework restored/built above. Built before
      # the release is created so it can be the *first* asset uploaded (#306).
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build the unsigned .ipa
        run: bash scripts/package-ipa.sh

      # #306: attach olcrtc-ios-unsigned.ipa BEFORE Mobile.xcframework.zip so the
      # user-facing sideload artifact leads on the Release page — GitHub orders
      # assets by upload time, so the .ipa goes in at release-create, the framework
      # in the follow-up upload.
      - name: Create the release with the unsigned .ipa
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" --title "$TAG" --notes-file notes.md olcrtc-ios-unsigned.ipa \
            || { gh release edit "$TAG" --notes-file notes.md; \
                 gh release upload "$TAG" olcrtc-ios-unsigned.ipa --clobber; }

      - name: Attach Mobile.xcframework
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release upload "$TAG" Mobile.xcframework.zip --clobber
