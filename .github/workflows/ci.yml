# #250: CI — build + test the iOS app and verify srv.sh<->upstream parity on
# every push/PR, plus a SwiftLint pass (#255, lenient — see .swiftlint.yml). The
# gomobile core (App/Mobile.xcframework, ~228 MB) is gitignored, so CI rebuilds it
# from the olcrtc-upstream submodule and caches it by the pinned upstream commit
# (the build is ~5 min; a cache hit skips Go entirely).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, test & parity
    runs-on: macos-15
    steps:
      - name: Checkout (with olcrtc-upstream submodule)
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # Fast-fail before the expensive Go/Xcode work: scripts/srv.sh must stay in
      # sync with olcrtc-upstream/script/srv.sh (only boc/eoc-marked patches differ).
      - name: Parity check (srv.sh vs upstream)
        run: python3 scripts/parity_check.py

      # The framework is a pure function of the upstream commit, so reuse it across
      # runs until the submodule pin moves.
      - name: Resolve pinned upstream commit (cache key)
        id: upstream
        run: echo "sha=$(git -C olcrtc-upstream rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache Mobile.xcframework
        id: fwcache
        uses: actions/cache@v5
        with:
          path: App/Mobile.xcframework
          key: mobile-xcframework-${{ runner.os }}-${{ steps.upstream.outputs.sha }}

      - name: Set up Go (version from the submodule's go.mod)
        if: steps.fwcache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: olcrtc-upstream/go.mod
          cache-dependency-path: olcrtc-upstream/go.sum

      # Shared with humans + the release workflow. -target=ios emits both device
      # and simulator slices; the simulator slice is what the tests link against.
      - name: Build Mobile.xcframework
        if: steps.fwcache.outputs.cache-hit != 'true'
        run: bash scripts/build-framework.sh

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate olcrtc-ios.xcodeproj
        run: xcodegen generate --spec project.yml

      # The runner image's simulator set drifts between Xcode versions, so a
      # hardcoded `name=iPhone 16` resolves to "OS:latest, name:iPhone 16" and
      # fails when that exact device isn't installed (the current failure). Unit
      # tests are model-agnostic — pick whatever iPhone the runner actually ships.
      - name: Build & run tests
        run: |
          UDID=$(xcrun simctl list devices available | grep -m1 'iPhone' | grep -oE '[0-9A-Fa-f-]{36}' || true)
          if [ -z "$UDID" ]; then
            echo "::error::No iPhone simulator available on this runner"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Testing on: $(xcrun simctl list devices available | grep -m1 'iPhone')"
          xcodebuild test \
            -project olcrtc-ios.xcodeproj \
            -scheme olcrtc-ios-tests \
            -destination "id=$UDID"

  # SwiftLint (#255). Source-only, so it skips the submodule + framework and runs
  # in parallel with build-test. Lenient config (.swiftlint.yml) + non-strict, so
  # warnings annotate but don't fail; tighten to `--strict` once the tree is clean.
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: SwiftLint
        run: |
          which swiftlint || brew install swiftlint
          swiftlint version
          swiftlint lint --reporter github-actions-logging
